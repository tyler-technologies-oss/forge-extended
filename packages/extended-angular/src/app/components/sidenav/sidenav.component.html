<forge-list navlist>
  <forge-list-item [selected]="homeLink.isActive" data-forge-app-layout-close>
    <forge-icon name="home" slot="start"></forge-icon>
    <a
      routerLink="/"
      #homeLink="routerLinkActive"
      routerLinkActive
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      >Home</a
    >
  </forge-list-item>
  <forge-expansion-panel #componentExpansionPanel>
    <forge-list-item slot="header">
      <forge-icon name="settings_input_component" slot="start"></forge-icon>
      <button>Components</button>
      <forge-open-icon slot="end"></forge-open-icon>
    </forge-list-item>
    @for (item of componentMenuItems; track item) {
      <forge-list-item indented [selected]="componentMenuLink.isActive" data-forge-app-layout-close>
        <a
          [routerLink]="[item.value]"
          #componentMenuLink="routerLinkActive"
          routerLinkActive
          [routerLinkActiveOptions]="{ exact: true }"
          ariaCurrentWhenActive="page"
          >{{ item.label }}</a
        >
      </forge-list-item>
    }
  </forge-expansion-panel>
</forge-list>
