<forge-app-layout [appTitle]="appLayoutState.appTitle()" [breakpoint]="appLayoutState.breakpoint()">
  <app-sidenav slot="navigation"></app-sidenav>
  <div slot="body" class="app-content">
    <router-outlet></router-outlet>
  </div>
  <forge-footer slot="footer">
    <forge-footer-item>
      <a href="javascript: void(0);">About</a>
    </forge-footer-item>
    <forge-footer-item>
      <a href="javascript: void(0);">Contact</a>
    </forge-footer-item>
    <forge-footer-item>
      <a href="javascript: void(0);">Privacy</a>
    </forge-footer-item>
    <forge-footer-item>
      <span>© 2026 Tyler Technologies</span>
    </forge-footer-item>

    <a slot="graphic" href="https://www.tylertech.com/" target="_blank">
      <img
        src="https://cdn.forge.tylertech.com/v1/images/branding/tyler/tyler-empowered-logo-white.svg"
        alt="Empowered by Tyler Technologies" />
    </a>
  </forge-footer>
